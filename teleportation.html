    <style>
        .tp-controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tp-controls input[type="text"] {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .tp-controls input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }

        .tp-controls label {
            font-weight: 600;
            font-size: 0.9em;
            color: #495057;
        }

        .tp-body {
            padding: 20px 30px 40px;
        }

        .tp-note {
            font-size: 0.82em;
            color: #6c757d;
            margin-bottom: 18px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 0 6px 6px 0;

            font-size: 1.1em;
            font-weight: 700;
            color: #495057;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 4px solid #667eea;
            padding: 8px 14px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 0;
        }

        .tp-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .tp-table th {
            background: #f1f3f5;
            color: #495057;
            font-weight: 600;
            padding: 7px 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
        }

        .tp-table th:last-child {
            text-align: left;
        }

        .tp-table td {
            padding: 7px 12px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .tp-table tr:last-child td {
            border-bottom: none;
        }

        .tp-table tr:hover td {
            background: #f8f9ff;
        }

        .code-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 0.88em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px 3px 2px 0;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, transform 0.1s;
        }

        .code-badge:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        .code-badge.copied {
            background: #28a745;
        }

        html[data-theme="dark"] .code-badge.copied {
            background: #1a6b2e;
        }

        .location-name {
            color: #212529;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
            font-style: italic;
        }

        .match-count {
            font-size: 0.85em;
            color: #6c757d;
            margin-left: auto;
        }

        .hidden {
            display: none;
        }

        /* ── Dark mode ─────────────────────────────────────────── */
        html[data-theme="dark"] .tp-controls {
            background: #252540;
            border-bottom-color: #3a3a5a;
        }

        html[data-theme="dark"] .tp-controls label {
            color: #c0c0e0;
        }

        html[data-theme="dark"] .tp-controls input[type="text"] {

            border-color: #3a3a5a;

        function copyCode(el, code) {
            navigator.clipboard.writeText(code).then(() => {
                el.classList.add('copied');
                const orig = el.textContent;
                el.textContent = '✓ ' + code;
                setTimeout(() => {
                    el.classList.remove('copied');
                    el.textContent = orig;
                }, 1200);
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = code;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                el.classList.add('copied');
                setTimeout(() => el.classList.remove('copied'), 1200);
            });
        }

        function buildTable() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '';

            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            let totalMatches = 0;
            let anyVisible = false;

            for (const zone of TELEPORT_DATA) {
                const matchedLocations = query
                    ? zone.locations.filter(loc =>
                        loc.name.toLowerCase().includes(query) ||
                        loc.codes.some(c => c.includes(query)) ||
                        zone.zone.toLowerCase().includes(query)
                      )
                    : zone.locations;

                if (matchedLocations.length === 0) continue;

                anyVisible = true;
                totalMatches += matchedLocations.length;

                const section = document.createElement('div');
                section.className = 'zone-section';

                const title = document.createElement('div');
                title.className = 'zone-title';
                title.textContent = zone.zone;
                section.appendChild(title);

                const table = document.createElement('table');
                table.className = 'tp-table';

                const thead = document.createElement('thead');
                thead.innerHTML = '<tr><th>Location</th><th>Codes</th></tr>';
                table.appendChild(thead);

                const tbody = document.createElement('tbody');
                for (const loc of matchedLocations) {
                    const tr = document.createElement('tr');
                    const nameTd = document.createElement('td');
                    nameTd.className = 'location-name';
                    nameTd.textContent = loc.name;

                    const codesTd = document.createElement('td');
                    for (const code of loc.codes) {
                        const badge = document.createElement('span');
                        badge.className = 'code-badge';
                        badge.textContent = code;
                        if (code !== '-') {
                            badge.title = 'Click to copy';
                            badge.addEventListener('click', () => copyCode(badge, code));
                        }
                        codesTd.appendChild(badge);
                    }

                    tr.appendChild(nameTd);
                    tr.appendChild(codesTd);
                    tbody.appendChild(tr);
                }

                table.appendChild(tbody);
                section.appendChild(table);
                container.appendChild(section);
            }

            const noResults = document.getElementById('noResults');
            const matchCount = document.getElementById('matchCount');

            if (!anyVisible) {
                noResults.classList.remove('hidden');
                matchCount.textContent = '';
            } else {
                noResults.classList.add('hidden');
                if (query) {
                    matchCount.textContent = `${totalMatches} location${totalMatches !== 1 ? 's' : ''} found`;
                } else {
                    matchCount.textContent = '';
                }
            }
        }

        function filterTable() {
            buildTable();
